name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    name: Python — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev,api]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q

  web:
    name: Web — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
