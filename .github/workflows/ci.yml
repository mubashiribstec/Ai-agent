name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python:
    name: Python — lint & test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,api,mcp]"
      - name: Lint
        run: ruff check src tests
      - name: Type check (non-blocking)
        run: mypy src/xplogent --ignore-missing-imports || true
      - name: Test
        run: pytest -q

  web:
    name: Web — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
