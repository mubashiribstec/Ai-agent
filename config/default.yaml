# ─── Xplogent default configuration ──────────────────────────────────────
# Anything here can be overridden by environment variables (XPLOGENT_*) or a
# user config at ~/.xplogent/config.yaml.

# Active model in "provider:model" form. Overridden by XPLOGENT_MODEL.
model: "ollama:llama3.1"

# Saved model presets shown in the GUI (Settings → Models, Chat switcher).
# effort: off|low|medium|high  ·  thinking: true|false
models:
  - { label: "Llama 3.1 (local)", model: "ollama:llama3.1", temperature: 0.7, effort: "off", thinking: false }
  - { label: "GPT-4o", model: "openai:gpt-4o", temperature: 0.7, effort: "off", thinking: false }
  - { label: "Claude Sonnet", model: "anthropic:claude-sonnet-4-6", temperature: 0.7, effort: "medium", thinking: true }

# Optional separate (usually cheaper/local) model for reflection & summaries.
reflection_model: "ollama:llama3.1"

# Embedding model used by the memory subsystem (local by default).
embedding_model: "ollama:nomic-embed-text"

agent:
  max_steps: 25            # max think→act iterations per task
  temperature: 0.7
  system_prompt: null      # null = use the built-in default prompt

memory:
  enabled: true
  short_term_max_tokens: 6000   # summarize the conversation past this budget
  retrieval_top_k: 5            # facts/skills injected per turn

safety:
  # Policy per risk tier: "auto" (run), "confirm" (ask), or "deny" (block).
  policy:
    low: auto
    medium: confirm
    high: confirm
    critical: deny
  # Commands matching these (regex, case-insensitive) are always critical.
  deny_patterns:
    # POSIX
    - "rm\\s+-rf\\s+/"
    - "mkfs"
    - ":\\(\\)\\s*\\{.*\\};:"   # fork bomb
    - "dd\\s+if=.*of=/dev/"
    # Windows
    - "format\\s+[a-z]:"
    - "del\\s+/[sf]"
    - "rd\\s+/s"
    - "rmdir\\s+/s"
    - "diskpart"
  # Filesystem writes restricted to these roots (empty = no path restriction).
  allowed_write_roots: []

tools:
  enabled:
    - shell
    - filesystem
    - python_exec
    - web
    - gui
    - browser

skills:
  enabled: true
  reflect_after_tasks: true   # run self-improvement reflection after each task
  reflect_min_steps: 0        # 0 = reflect after every task (incl. plain chat)

# ─── Multi-agent orchestration ────────────────────────────────────────
orchestrator:
  max_concurrent_agents: 3    # how many agents may run at the same time
  default_mode: auto          # "auto" (decompose a goal) or "manual" (named agents)
  enable_collab_tools: true   # give agents broadcast/send_message/read_inbox tools

# ─── Per-agent rights (role profiles) ─────────────────────────────────
# Each role limits which tools an agent may use, its risk policy, the
# filesystem paths it may touch, and network access. Assign roles to agents
# when orchestrating. "*" means "all".
roles:
  orchestrator:
    allowed_tools: "*"
    policy: { low: auto, medium: confirm, high: confirm, critical: deny }
    allowed_paths: []
    network: true
    max_steps: 30
  researcher:
    allowed_tools: [web_search, web_fetch, read_file, list_dir,
                    broadcast, send_message, read_inbox, list_agents]
    policy: { low: auto, medium: confirm, high: deny, critical: deny }
    allowed_paths: []
    network: true
    max_steps: 20
  coder:
    allowed_tools: [read_file, write_file, edit_file, list_dir, shell, python_exec,
                    broadcast, send_message, read_inbox, list_agents]
    policy: { low: auto, medium: auto, high: confirm, critical: deny }
    allowed_paths: []         # set to e.g. ["./workspace"] to sandbox writes
    network: false
    max_steps: 25
  reviewer:
    allowed_tools: [read_file, list_dir, web_search, web_fetch,
                    broadcast, send_message, read_inbox, list_agents]
    policy: { low: auto, medium: confirm, high: deny, critical: deny }
    allowed_paths: []
    network: true
    max_steps: 15
  operator:
    allowed_tools: "*"
    policy: { low: auto, medium: confirm, high: confirm, critical: deny }
    allowed_paths: []
    network: true
    max_steps: 30
  restricted:
    allowed_tools: [read_file, list_dir]
    policy: { low: confirm, medium: deny, high: deny, critical: deny }
    allowed_paths: []
    network: false
    max_steps: 10

# ─── Expose Xplogent as an MCP server ─────────────────────────────────
# Lets MCP clients (Claude Desktop/Code, other agents) call into Xplogent.
mcp:
  server:
    agent_role: operator        # role profile applied to MCP-driven runs
    auto_approve: false         # allow confirm-tier actions without a human
    expose_raw_tools: true      # expose individual PC-control tools as MCP tools
    transport: stdio            # stdio | sse | streamable-http
    host: 127.0.0.1
    port: 8766
