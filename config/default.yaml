# ─── Xplogent default configuration ──────────────────────────────────────
# Anything here can be overridden by environment variables (XPLOGENT_*) or a
# user config at ~/.xplogent/config.yaml.

# Active model in "provider:model" form. Overridden by XPLOGENT_MODEL.
model: "ollama:llama3.1"

# Saved model presets shown in the GUI (Settings → Models, Chat switcher).
# effort: off|low|medium|high  ·  thinking: true|false
models:
  - { label: "Llama 3.1 (local)", model: "ollama:llama3.1", temperature: 0.7, effort: "off", thinking: false }
  - { label: "GPT-4o", model: "openai:gpt-4o", temperature: 0.7, effort: "off", thinking: false }
  - { label: "Claude Sonnet", model: "anthropic:claude-sonnet-4-6", temperature: 0.7, effort: "medium", thinking: true }
  - { label: "Gemini 1.5 Pro", model: "gemini:gemini-1.5-pro", temperature: 0.7, effort: "off", thinking: false }
  - { label: "Claude (subscription, no key)", model: "claude-cli:sonnet", temperature: 0.7, effort: "off", thinking: false }
  - { label: "LLaVA (local vision)", model: "ollama:llava", temperature: 0.7, effort: "off", thinking: false, vision: true }

# Optional separate (usually cheaper/local) model for reflection & summaries.
reflection_model: "ollama:llama3.1"

# Embedding model used by the memory subsystem (local by default).
embedding_model: "ollama:nomic-embed-text"

# Vision model for the 'analyze_image' tool (seeing screenshots/images).
# Empty = reuse `model` if it's vision-capable. Examples: openai:gpt-4o,
# anthropic:claude-sonnet-4-6, ollama:llava.
vision_model: ""

agent:
  max_steps: 25            # max think→act iterations per task
  temperature: 0.7
  system_prompt: null      # null = use the built-in default prompt
  provider_retries: 2      # retry transient provider errors (network/timeout/429)
  vision_tools: false      # send tools on image turns (off so local vision e.g. llava works)

memory:
  enabled: true
  short_term_max_tokens: 6000   # summarize the conversation past this budget
  retrieval_top_k: 5            # facts/skills injected per turn
  auto_compact_every: 0         # distill MEMORY.md every N tasks (0 = off; use the GUI/API)
  graph_recall: true            # surface related knowledge-graph entities/relations per turn
  md_max_chars: 6000            # character budget for the agent-curated MEMORY.md (memory tool)

# Live Canvas: let the agent render interactive HTML into a dashboard panel.
canvas:
  enabled: true

# Dashboard/API security. Leave auth_token empty for an open localhost server;
# `xplogent token` sets one, and it's auto-generated when binding to 0.0.0.0.
server:
  auth_token: ""

# Cost guardrails. Caps are in USD; 0 disables a cap. When a cap is hit, on_exceed
# is one of: "warn" (notify, keep going), "downgrade" (switch to downgrade_model),
# or "pause" (stop the run). Estimates use the same per-model pricing as Analytics.
budget:
  daily_usd: 0
  session_usd: 0
  on_exceed: warn
  downgrade_model: ""

safety:
  # Policy per risk tier: "auto" (run), "confirm" (ask), or "deny" (block).
  policy:
    low: auto
    medium: confirm
    high: confirm
    critical: deny
  # Commands matching these (regex, case-insensitive) are always critical.
  deny_patterns:
    # POSIX
    - "rm\\s+-rf\\s+/"
    - "mkfs"
    - ":\\(\\)\\s*\\{.*\\};:"   # fork bomb
    - "dd\\s+if=.*of=/dev/"
    # Windows
    - "format\\s+[a-z]:"
    - "del\\s+/[sf]"
    - "rd\\s+/s"
    - "rmdir\\s+/s"
    - "diskpart"
  # Filesystem writes restricted to these roots (empty = no path restriction).
  allowed_write_roots: []

tools:
  enabled:
    - shell
    - filesystem
    - python_exec
    - web
    - gui
    - browser
    - browser_extension
    - vision
    - documents
    - memory

# ─── Execution backend for `shell` / `python_exec` ────────────────────
# Where commands run. "local" = this machine (default). "docker" runs them
# inside a container; "ssh" runs them on a remote host. Isolating execution
# limits the agent's reach without changing any tool. The deny-list still
# applies before dispatch on every backend.
execution:
  backend: local              # local | docker | ssh
  docker:
    image: "python:3.11-slim" # used when no long-lived container is set
    container: ""             # name/id of a running container to `docker exec` into
    workdir: "/work"
  ssh:
    host: ""
    user: ""
    key_path: ""              # path to a private key (optional)
    port: 22

skills:
  enabled: true
  reflect_after_tasks: true   # run self-improvement reflection after qualifying tasks
  reflect_min_steps: 1        # min tools used before reflecting (1 = skip plain chat; 0 = always)
  reflect_every: 1            # only reflect every Nth qualifying task (higher = cheaper)

# ─── Multi-agent orchestration ────────────────────────────────────────
orchestrator:
  max_concurrent_agents: 3    # how many agents may run at the same time
  default_mode: auto          # "auto" (decompose a goal) or "manual" (named agents)
  enable_collab_tools: true   # give agents broadcast/send_message/read_inbox tools
  max_task_retries: 2         # retry a failed subtask on transient errors
  max_delegation_depth: 2     # how deep an agent may spawn sub-agents (delegate_task)

# ─── Scheduler (recurring / timed agent jobs) ─────────────────────────
# Define jobs in plain English ("every day at 9am") or 5-field cron (needs the
# optional 'croniter' package). Jobs run unattended inside the server process.
scheduler:
  enabled: true
  tick_seconds: 30            # how often the loop checks for due jobs

# ─── Per-agent rights (role profiles) ─────────────────────────────────
# Each role limits which tools an agent may use, its risk policy, the
# filesystem paths it may touch, and network access. Assign roles to agents
# when orchestrating. "*" means "all".
roles:
  orchestrator:
    allowed_tools: "*"
    policy: { low: auto, medium: confirm, high: confirm, critical: deny }
    allowed_paths: []
    network: true
    max_steps: 30
  researcher:
    allowed_tools: [web_search, web_fetch, read_file, list_dir, analyze_image,
                    broadcast, send_message, read_inbox, list_agents]
    policy: { low: auto, medium: confirm, high: deny, critical: deny }
    allowed_paths: []
    network: true
    max_steps: 20
  coder:
    allowed_tools: [read_file, write_file, edit_file, list_dir, shell, python_exec,
                    broadcast, send_message, read_inbox, list_agents]
    policy: { low: auto, medium: auto, high: confirm, critical: deny }
    allowed_paths: []         # set to e.g. ["./workspace"] to sandbox writes
    network: false
    max_steps: 25
  reviewer:
    allowed_tools: [read_file, list_dir, web_search, web_fetch, analyze_image,
                    broadcast, send_message, read_inbox, list_agents]
    policy: { low: auto, medium: confirm, high: deny, critical: deny }
    allowed_paths: []
    network: true
    max_steps: 15
  operator:
    allowed_tools: "*"
    policy: { low: auto, medium: confirm, high: confirm, critical: deny }
    allowed_paths: []
    network: true
    max_steps: 30
  restricted:
    allowed_tools: [read_file, list_dir]
    policy: { low: confirm, medium: deny, high: deny, critical: deny }
    allowed_paths: []
    network: false
    max_steps: 10

# ─── Expose Xplogent as an MCP server ─────────────────────────────────
# Lets MCP clients (Claude Desktop/Code, other agents) call into Xplogent.
mcp:
  server:
    agent_role: operator        # role profile applied to MCP-driven runs
    auto_approve: false         # allow confirm-tier actions without a human
    expose_raw_tools: true      # expose individual PC-control tools as MCP tools
    transport: stdio            # stdio | sse | streamable-http
    host: 127.0.0.1
    port: 8766
