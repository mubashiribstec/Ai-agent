<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 260px; font: 13px system-ui, sans-serif; padding: 12px; margin: 0; }
    h3 { margin: 0 0 8px; }
    label { display: block; margin: 8px 0 2px; color: #555; font-size: 12px; }
    input[type="text"], input[type="password"] { width: 100%; box-sizing: border-box; padding: 6px; }
    .row { display: flex; align-items: center; gap: 6px; margin-top: 10px; }
    button { margin-top: 12px; width: 100%; padding: 7px; cursor: pointer; }
    #status { margin-top: 10px; font-size: 12px; color: #777; }
  </style>
</head>
<body>
  <h3>Xplogent Browser Control</h3>
  <label for="url">Backend WebSocket</label>
  <input type="text" id="url" placeholder="ws://localhost:8765/ws/extension" />
  <label for="token">Access token (if enabled)</label>
  <input type="password" id="token" placeholder="(optional)" />
  <div class="row"><input type="checkbox" id="mon" /><span>Monitor input-field activity</span></div>
  <button id="save">Save &amp; reconnect</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
